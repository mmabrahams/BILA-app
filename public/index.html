<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BILA Dimitri-Miquel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-content">
        <div class="brand">
          <svg class="logo" viewBox="0 0 44 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 2L3 34h12l7-16" fill="#3b6eb5"/>
            <path d="M26 2l15 32H29l-7-16" fill="#00d4ff"/>
          </svg>
          <div class="brand-text">
            <h1>BILA</h1>
            <span class="brand-subtitle">Dimitri &ndash; Miquel</span>
          </div>
        </div>
        <div class="header-right">
          <span id="save-status" class="save-status"></span>
          <span id="connection-status" class="connection-dot connected" title="Verbonden"></span>
        </div>
      </div>
      <div class="week-nav">
        <button id="prev-week" title="Vorige week">
          <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5.5 8 10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="week-info">
          <span id="week-label">Week 10</span>
          <span id="week-dates">2–6 maart 2026</span>
        </div>
        <button id="next-week" title="Volgende week">
          <svg viewBox="0 0 16 16" fill="none"><path d="M6 3l4.5 5L6 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="today-btn" class="today-btn hidden" title="Ga naar deze week">Vandaag</button>
      </div>
    </header>

    <section id="stage-overview" class="stage-overview">
      <!-- Dynamisch gevuld door renderOverview() -->
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="begin">
        Begin van de week
      </button>
      <button class="tab" data-tab="einde">
        Einde van de week
      </button>
    </nav>

    <main id="content">
    </main>

    <footer class="app-footer">
      <svg width="14" height="12" viewBox="0 0 44 38" fill="none">
        <path d="M18 2L3 34h12l7-16" fill="#3b6eb5"/>
        <path d="M26 2l15 32H29l-7-16" fill="#00d4ff"/>
      </svg>
      <span>Go Beyond Procurement</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
